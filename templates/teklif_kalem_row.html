<div class="kalem-row grid grid-cols-1 md:grid-cols-12 gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-lg border border-slate-100 dark:border-slate-700">
    <div class="md:col-span-5">
        <label class="md:hidden block text-xs font-bold text-slate-500 mb-1">Ürün</label>
        <select name="urunler[]" required onchange="updateUrun(this)" class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm text-slate-900 dark:text-white">
            <option value="">Ürün seçin</option>
            {% for urun in urunler %}
            <option value="{{ urun.id }}" data-fiyat="{{ urun.satis_fiyati }}" data-birim="{{ urun.birim or 'Adet' }}" {% if row_urun_id == urun.id %}selected{% endif %}>{{ urun.urun_adi }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="md:col-span-2">
        <label class="md:hidden block text-xs font-bold text-slate-500 mb-1">Miktar</label>
        <input type="number" name="miktarlar[]" value="{{ row_miktar }}" min="0.01" step="0.01" required class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm text-right text-slate-900 dark:text-white">
    </div>
    <div class="md:col-span-2">
        <label class="md:hidden block text-xs font-bold text-slate-500 mb-1">Birim</label>
        <input type="text" name="birimler[]" value="{{ row_birim }}" readonly class="w-full px-3 py-2.5 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-100 dark:bg-slate-900 text-sm text-center text-slate-500">
    </div>
    <div class="md:col-span-2">
        <label class="md:hidden block text-xs font-bold text-slate-500 mb-1">Fiyat</label>
        <input type="number" name="fiyatlar[]" value="{{ row_fiyat }}" min="0" step="0.01" required class="w-full px-3 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-sm text-right text-slate-900 dark:text-white">
    </div>
    <div class="md:col-span-1 flex items-end md:items-center justify-end">
        <button type="button" onclick="removeKalem(this)" class="size-10 rounded-lg text-slate-400 hover:bg-red-50 hover:text-red-600 dark:hover:bg-red-900/20 transition-colors flex items-center justify-center" title="Kalemi sil">
            <span class="material-symbols-outlined">delete</span>
        </button>
    </div>
</div>
